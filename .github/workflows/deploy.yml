name: Deploy to GitHub Pages

on:
  push:
    branches: nav  # 修改为你的主分支名

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 👇 根据项目调整构建步骤（示例为 Node.js 项目）
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build  # 输出目录通常为 dist/、public/ 等
      
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'  # ✨ 改为你的构建输出目录！
      - id: deployment
        uses: actions/deploy-pages@v4
